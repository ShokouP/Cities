    - heading "欢迎来到《看不见的城市》" [level=2] [ref=f18e420]
    - paragraph [ref=f18e421]: 这里是卡尔维诺五十五座城市的中文交互式星座。每一座城市都是一颗发光的节点，按照「记忆、欲望、符号、轻盈……」十一类主题聚成星群。
    - list [ref=f18e422]:
      - listitem [ref=f18e423]:
        - strong [ref=f18e424]: 悬停
        - text: 城市，查看它的名字、主题与一句摘录。
      - listitem [ref=f18e425]:
        - strong [ref=f18e426]: 点击
        - text: 城市，右侧会展开详情面板，展示对它的文学描述。
      - listitem [ref=f18e427]:
        - strong [ref=f18e428]: 右键
        - text: 城市，选择「阅读原文」，即可阅读该书对应章节的完整原文。
      - listitem [ref=f18e429]: 点击城市时，连接会按一定概率自动「拆解」并「重组」，不同主题的城市会彼此产生回声。
      - listitem [ref=f18e430]: 开启右上角「连接模式」，可以手动选择两座城市建立新连接，或右键城市拆解它的连接。
      - listitem [ref=f18e431]: 点击顶部的主题标签，可以只高亮某一类城市，其他城市会淡入背景。
      - listitem [ref=f18e432]: 拖动背景可以平移，滚动鼠标可以缩放；按「重置视角」回到初始画面。
    - paragraph [ref=f18e433]: 愿你在这座星空里，重新遇见马可·波罗向忽必烈汗讲述的那些城市。
    - generic [ref=f18e434]: 文字摘录与原文来自 Italo Calvino《看不见的城市》（张密等译本）。本项目仅供文学阅读与可视化学习使用。
