<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光速城 · Lightspeed Grid</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0c0f; display:flex; justify-content:center; align-items:center;
    min-height:100vh; min-height:100dvh; overflow:hidden; font-family:'Share Tech Mono',monospace;
  }
  #app {
    width:min(1200px, 100vw); height:min(800px, 100dvh);
    max-width:1200px;
    background:#0d1117;
    border:2px solid #1a3a2a; border-radius:6px; position:relative;
    box-shadow:0 0 40px rgba(0,255,100,0.06), inset 0 0 80px rgba(0,0,0,0.5);
    display:flex; flex-direction:column; user-select:none;
  }
  @media (max-width: 700px) {
    #app { height: 100dvh; max-height: none; border: none; border-radius: 0; }
    #hud { padding: 0 6px; gap: 4px; }
    #hud .hud-label { display: none; }
    #tip-bar { min-height: 16px; }
    #tip-text { font-size: 7px; }
    #canvas-wrap { overflow-x: auto; overflow-y: hidden; }
    canvas { min-width: 720px; height: 100%; }
    #card-hand { min-height: 78px; max-height: 96px; padding: 4px 6px; }
    .card { width: clamp(96px, 22vw, 120px); height: clamp(70px, 19vw, 88px); margin: 0 3px; }
    .card-name { max-width: 58px; }
    .card-desc { display: none; }
    .card-stats { font-size: 7px; gap: 4px; }
    .card-tag { font-size: 6px; padding: 0 2px; }
    #ai-threat { max-width: 70px; }
  }
  #hud {
    min-height:40px; display:flex; align-items:center; justify-content:space-between;
    padding:0 10px; border-bottom:1px solid #1a3a2a;
    background:rgba(0,0,0,0.35); font-size:clamp(10px,2.8vw,13px); color:#7eb896;
    gap:6px;
  }
  .hud-item { display:flex; flex-direction:column; align-items:flex-start; gap:1px; }
  .hud-item.right { align-items:flex-end; }
  .hud-row { display:flex; align-items:center; gap:clamp(2px,1vw,6px); }
  .hud-label { color:#4a6b5a; font-size:clamp(7px,1.8vw,10px); text-transform:uppercase; letter-spacing:0.5px; }
  .hud-value { color:#3cf58b; font-size:clamp(13px,3.6vw,17px); font-weight:bold; }
  .hud-value.danger { color:#f53c3c; animation:pulse 0.6s infinite; }
  #time-display.danger { color:#f53c3c; animation:pulse 0.6s infinite; }
  .power-bar, .core-bar { width:clamp(40px,11vw,70px); height:4px; background:#0f1812; border-radius:2px; overflow:hidden; border:1px solid #1a2e20; }
  .power-bar-inner { height:100%; background:linear-gradient(90deg,#3cf58b,#2ad46e); transition:width 0.15s; }
  .core-bar-inner { height:100%; background:linear-gradient(90deg,#3cf58b,#2ad46e); transition:width 0.15s; }
  .core-bars { display:flex; gap:2px; margin-top:1px; }
  .mini-core-bar { width:clamp(12px,3.5vw,20px); height:3px; background:#0f1812; border-radius:1px; overflow:hidden; }
  .mini-core-inner { height:100%; background:#3cf58b; transition:width 0.15s; }
  @keyframes pulse { 50% { opacity:0.4; } }
  #ai-threat { margin-top:1px; font-size:clamp(7px,1.8vw,9px); color:#c08080; max-width:90px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #canvas-wrap { flex:1; position:relative; overflow:hidden; min-height:0; }
  canvas { display:block; width:100%; height:100%; }
  /* ── Card Hand ── */
  #card-hand {
    height: auto; min-height: 90px; max-height: 122px;
    display: flex; align-items: center; justify-content: center; gap: 0;
    padding: 6px 8px; border-top: 1px solid #1a3a2a; background: rgba(0,0,0,0.55);
    overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch;
    scrollbar-width: thin; scrollbar-color: #1a3a2a #0a0c0f;
  }
  #card-hand::-webkit-scrollbar { height: 4px; }
  #card-hand::-webkit-scrollbar-thumb { background: #1a3a2a; border-radius: 2px; }
  .card {
    width: clamp(110px, 18vw, 150px); height: clamp(80px, 16vw, 106px);
    background: #0b120f;
    border: 2px solid #1a2e20; border-radius: 2px;
    cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0;
    transition: all 0.12s ease; margin: 0 4px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    image-rendering: pixelated;
    touch-action: manipulation;
  }
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--card-accent, #3cf58b);
}
.card:hover {
  border-color: var(--card-accent, #3cf58b);
  transform: translateY(-4px);
  box-shadow: 0 0 0 1px var(--card-accent, #3cf58b), 0 6px 18px rgba(0,0,0,0.5);
}
.card.selected {
  border-color: var(--card-accent, #3cf58b);
  transform: translateY(-8px);
  box-shadow: 0 0 0 2px var(--card-accent, #3cf58b), 0 10px 26px rgba(0,0,0,0.6);
}
.card.unaffordable { opacity: 0.32; pointer-events: none; filter: grayscale(0.8); }
  .card-inner {
    display: grid;
    grid-template-columns: clamp(34px, 8vw, 44px) 1fr;
    grid-template-rows: clamp(14px, 4vw, 18px) 1fr clamp(14px, 4vw, 18px);
    height: 100%; padding: 4px 6px 4px 4px; position: relative; z-index: 1;
  }
  .card-pixel {
    grid-row: 1 / 4; width: clamp(30px, 7vw, 38px); height: clamp(70px, 15vw, 90px);
    background: #0a0f0c; border: 1px solid #1f3326;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-pixel canvas { width: clamp(26px, 6vw, 32px); height: clamp(62px, 13vw, 84px); image-rendering: pixelated; }
  .card-header { grid-column: 2; display: flex; justify-content: space-between; align-items: center; }
  .card-name { font-size: clamp(9px, 2.6vw, 12px); font-weight: bold; color: #e8f0e8; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: clamp(52px, 14vw, 78px); }
  .card-cost {
    font-size: clamp(11px, 3.2vw, 14px); font-weight: bold; color: var(--card-accent, #3cf58b); line-height: 1;
    min-width: 16px; text-align: right;
  }
  .card-body { grid-column: 2; display: flex; flex-direction: column; gap: 1px; padding-top: 2px; }
  .card-desc { font-size: clamp(6px, 1.8vw, 8px); color: #7a9a88; line-height: 1.3; }
  .card-stats { display: flex; gap: clamp(4px, 1.5vw, 8px); margin-top: auto; font-size: clamp(6px, 1.8vw, 8px); color: #5a7a6a; }
  .card-stat { display: flex; align-items: center; gap: 2px; }
  .card-stat-val { color: #a0c0aa; font-weight: bold; }
  .card-footer { grid-column: 2; display: flex; justify-content: space-between; align-items: center; }
  .card-tag {
    font-size: clamp(5px, 1.6vw, 7px); padding: 1px 3px; letter-spacing: 0.5px; text-transform: uppercase;
    background: rgba(0,0,0,0.4); color: var(--card-accent, #3cf58b); border: 1px solid rgba(255,255,255,0.12);
  }
.card-tag.flying { color: #d4b830; border-color: rgba(212,184,48,0.35); }
.card-tag.spell { color: #b880f0; border-color: rgba(184,128,240,0.35); }
.card-tag.building { color: #68a8e0; border-color: rgba(104,168,224,0.3); }
.card-tag.ground { color: #e08850; border-color: rgba(224,136,80,0.3); }
  #tooltip {
    position:absolute; pointer-events:none; z-index:10;
    background:rgba(5,10,8,0.95); border:1px solid #2a4a3a;
    border-radius:5px; padding:10px 14px; font-size:11px; color:#b8d4c3;
    max-width:220px; display:none;
  }
  #message {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    pointer-events:none; z-index:20;
    font-size:22px; color:#3cf58b; text-shadow:0 0 20px rgba(60,245,139,0.5);
    display:none; text-align:center; line-height:1.5;
  }
  #overlay {
    position:absolute; inset:0; z-index:15; background:rgba(0,0,0,0.7);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    padding:20px; text-align:center;
  }
  #overlay h1 { font-size:clamp(22px, 6vw, 32px); color:#3cf58b; letter-spacing:4px; text-shadow:0 0 30px rgba(60,245,139,0.4); }
  #overlay p { color:#7eb896; font-size:clamp(11px, 3vw, 14px); max-width:min(500px, 90vw); text-align:center; line-height:1.6; }
  #overlay div { flex-wrap:wrap; justify-content:center; }
  #overlay button {
    background:transparent; border:2px solid #3cf58b; color:#3cf58b;
    padding:clamp(8px, 3vw, 12px) clamp(24px, 10vw, 40px); font-size:clamp(13px, 4vw, 16px); font-family:inherit; cursor:pointer;
    letter-spacing:2px; border-radius:4px; transition:all 0.2s;
  }
  #tip-bar {
    min-height:18px; display:flex; align-items:center; justify-content:center;
    border-bottom:1px solid #1a3a2a; background:rgba(0,0,0,0.25); padding:2px 8px;
  }
  #tip-text { font-size:clamp(8px, 2.2vw, 10px); color:#4a7a5a; text-align:center; }
  #overlay button:hover { background:rgba(60,245,139,0.1); box-shadow:0 0 24px rgba(60,245,139,0.25); }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hud-item">
      <div class="hud-row"><span class="hud-label">算力</span><span class="hud-value" id="power-display">5/10</span></div>
      <div class="power-bar"><div class="power-bar-inner" id="power-bar" style="width:50%"></div></div>
    </div>
    <div class="hud-item">
      <div class="hud-row"><span class="hud-label">核心服务器</span><span class="hud-value" id="core-display">5000</span></div>
      <div class="core-bars">
        <div class="mini-core-bar"><div class="mini-core-inner" id="core-bar-0" style="width:100%"></div></div>
        <div class="mini-core-bar"><div class="mini-core-inner" id="core-bar-1" style="width:100%"></div></div>
        <div class="mini-core-bar"><div class="mini-core-inner" id="core-bar-2" style="width:100%"></div></div>
      </div>
    </div>
    <div class="hud-item"><div class="hud-row"><span class="hud-label">计时</span><span class="hud-value" id="time-display">00:00</span></div></div>
    <div class="hud-item right">
      <div class="hud-row"><span class="hud-label">AI核心</span><span class="hud-value" id="ai-core-display">5000</span></div>
      <div class="core-bars">
        <div class="mini-core-bar"><div class="mini-core-inner" id="ai-core-bar-0" style="width:100%"></div></div>
        <div class="mini-core-bar"><div class="mini-core-inner" id="ai-core-bar-1" style="width:100%"></div></div>
        <div class="mini-core-bar"><div class="mini-core-inner" id="ai-core-bar-2" style="width:100%"></div></div>
      </div>
    </div>
    <div class="hud-item right">
      <div class="hud-row"><span class="hud-label">AI算力</span><span class="hud-value" id="ai-power-display">5/10</span></div>
      <div class="power-bar"><div class="power-bar-inner" id="ai-power-bar" style="width:50%"></div></div>
      <div id="ai-threat" style="margin-top:3px;font-size:9px;color:#c08080;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">侦察中…</div>
    </div>
  </div>
  <div id="tip-bar">
    <span id="tip-text">点击手牌选中 → 点击我方部署区放置单位 → 守住三路核心服务器</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="game"></canvas>
    <div id="tooltip"></div>
    <div id="message"></div>
  </div>
  <div id="card-hand"></div>
  <div id="overlay">
    <h1>光 速 城</h1>
    <p>Lightspeed Grid · 网络安全攻防<br>拖卡牌到战场部署 · 单位自动前进交战<br>左路暴露面 → 中路横向移动 → 右路核心资产区</p>
    <div style="display:flex;gap:16px;">
      <button id="start-defend-btn">防 守 方（蓝 队）</button>
      <button id="start-attack-btn">进 攻 方（红 队）</button>
    </div>
  </div>
</div>

<script>
const CANVAS_W=1200,CANVAS_H=641;
const MAX_POWER=10,START_POWER=7,POWER_REGEN=1.0,POWER_REGEN_FAST=1.5,FAST_REGEN_TIME=60;
const GAME_TIME_LIMIT=300;
const LANE_H=140,LANES_Y=[110,310,510],LANE_NAMES=['暴露面','横向移动通道','核心资产区'];
const LANE_X0=120,LANE_X1=1080,LANE_W=LANE_X1-LANE_X0;
const TOWER_HP=1400,CORE_HP=3600;
const TOWER_ATK=20,TOWER_ATK_SPD=1.0,TOWER_RANGE=120;
const BLUE_TOWER_X=280,RED_TOWER_X=920,TOWER_W=32,TOWER_H=60;
const CORE_W=36,PER_LANE_CORE_H=100;
const DEPLOY_ZONE_BLUE=420,DEPLOY_ZONE_RED=780;
const DRAW_INTERVAL=5;
const ROLE_HINTS={
  blue:'守住三路核心服务器 · 点击手牌 → 点击我方部署区',
  red:'摧毁三路核心服务器 · 点击手牌 → 点击我方部署区'
};

const BLUE_CARDS=[
  {id:'firewall',name:'防火墙',cost:2,type:'building',hp:700,atk:0,atkSpd:0,range:0,speed:0,duration:0,desc:'纯阻挡，横跨路面',tag:'建筑',color:'#3c8cf5'},
  {id:'waf',name:'WAF',cost:3,type:'building',hp:340,atk:45,atkSpd:0.65,range:180,speed:0,duration:0,desc:'专杀SQL注入(×2)·对空·可跨路',tag:'建筑',color:'#5ca8f0',bonusVs:'sql_inject',flyTarget:true,crossLane:true},
  {id:'ids',name:'IDS',cost:4,type:'building',hp:420,atk:28,atkSpd:0.45,range:220,speed:0,duration:40,desc:'范围伤害·打飞行·跨路·揭示隐身',tag:'建筑',color:'#50e890',flyTarget:true,aoe:true,crossLane:true},
  {id:'edr',name:'EDR',cost:3,type:'ground',hp:300,atk:60,atkSpd:0.55,range:80,speed:85,duration:0,desc:'优先打血量最低的·死后反打',tag:'地面',color:'#4088e0',prioLowest:true,deathDmg:80},
  {id:'honeypot',name:'蜜罐',cost:2,type:'building',hp:260,atk:0,atkSpd:0,range:0,speed:0,duration:25,desc:'死后爆炸160·吸引全图地面改道',tag:'建筑',color:'#e0b040',taunt:true,deathDmg:160,tauntRange:260},
  {id:'patch',name:'补丁管理',cost:2,type:'spell',hp:0,atk:0,atkSpd:0,range:0,speed:0,duration:0,desc:'给单座建筑回血30%',tag:'法术',color:'#60d080',spell:'heal',healPct:0.30},
  {id:'emergency',name:'应急响应',cost:6,type:'spell',hp:0,atk:0,atkSpd:0,range:0,speed:0,duration:0,desc:'全图清场·消灭所有敌方单位',tag:'法术',color:'#f06040',spell:'killAll'},
  {id:'encrypt',name:'加密传输',cost:3,type:'spell',hp:0,atk:0,atkSpd:0,range:0,speed:0,duration:0,desc:'套塔·500护盾',tag:'法术',color:'#70c0f0',spell:'shield',shieldAmt:500},
  {id:'threat_hunter',name:'溯源小队',cost:7,type:'ground',hp:750,atk:110,atkSpd:1.1,range:75,speed:55,duration:0,desc:'高费重甲·直捣红队核心塔',tag:'地面',color:'#20d0a0',prioCore:true},
];
const RED_CARDS=[
  {id:'scan',name:'网络扫描',cost:2,type:'spell',hp:0,atk:0,atkSpd:0,range:0,speed:0,duration:0,desc:'揭示对方部署4秒',tag:'法术',color:'#f08040',spell:'reveal',revealTime:4},
  {id:'phish',name:'钓鱼邮件',cost:4,type:'flying',hp:380,atk:90,atkSpd:0.6,range:65,speed:160,duration:0,desc:'飞过地面防线·直击塔',tag:'飞行',color:'#e0c040'},
  {id:'sql_inject',name:'SQL注入',cost:5,type:'ground',hp:620,atk:155,atkSpd:0.7,range:55,speed:95,duration:0,desc:'对数据库塔伤害×2',tag:'地面',color:'#e04040',bonusVs:'db_tower'},
  {id:'bruteforce',name:'暴力破解',cost:2,type:'ground',hp:320,atk:75,atkSpd:0.45,range:45,speed:90,duration:0,desc:'越打越疼（每3秒+18）',tag:'地面',color:'#f06030',ramping:true},
  {id:'zeroday',name:'零日漏洞',cost:7,type:'spell',hp:0,atk:800,atkSpd:0,range:0,speed:0,duration:0,desc:'800伤害·无视护盾',tag:'法术',color:'#c030c0',spell:'directDmg',dmg:800,pierceShield:true},
  {id:'ddos',name:'DDoS',cost:4,type:'spell',hp:0,atk:200,atkSpd:0,range:0,speed:0,duration:0,desc:'范围瘫痪3秒+200伤害',tag:'法术',color:'#a03030',spell:'aoeStun',dmg:200,stun:3,aoeRange:160},
  {id:'ransomware',name:'勒索软件',cost:6,type:'ground',hp:1300,atk:125,atkSpd:0.6,range:50,speed:60,duration:0,desc:'高血量肉盾·坦克',tag:'地面',color:'#d02020',heavy:true},
  {id:'backdoor',name:'后门',cost:4,type:'building',hp:520,atk:0,atkSpd:0,range:0,speed:0,duration:40,desc:'隐匿·每6秒生小兵',tag:'建筑',color:'#9040d0',stealth:true,spawnCd:6,spawnUnit:'minion'},
];

let game=null,animId=null,selectedCard=null,mouseX=0,mouseY=0;
let particleEffects=[],floatingTexts=[],nextUid=1;
let shakeTimer=0,flashTimer=0;
const canvas=document.getElementById('game');
canvas.width=CANVAS_W;canvas.height=CANVAS_H;

class Unit{
  constructor(card,team,lane,x){
    this.uid=nextUid++;this.card=card;this.team=team;this.lane=lane;this.x=x;
    this.y=LANES_Y[lane];this.hp=card.hp||1;this.maxHp=this.hp;
    this.atk=card.atk||0;this.atkSpd=card.atkSpd||1;this.atkCd=0;
    this.range=card.range||60;this.speed=card.speed||0;
    this.isFlying=card.type==='flying';this.isBuilding=card.type==='building';
    this.duration=card.duration||0;this.age=0;this.alive=true;
    this.shield=0;this.stealth=card.stealth||false;this.taunt=card.taunt||false;
    this.tauntRange=card.tauntRange||0;this.ramping=card.ramping||false;
    this.rampStacks=0;this.rampTimer=0;this.bonusVs=card.bonusVs||null;
    this.prioLowest=card.prioLowest||false;this.prioCore=card.prioCore||false;this.flyTarget=card.flyTarget||false;
    this.crossLane=card.crossLane||false;this.aoe=card.aoe||false;this.deathDmg=card.deathDmg||0;
    this.spawnCd=card.spawnCd||0;this.spawnTimer=0;this.revealed=false;this.stunned=0;this.target=null;
  }
  update(dt){
    if(!this.alive)return;
    this.age+=dt;this.atkCd=Math.max(0,this.atkCd-dt);this.stunned=Math.max(0,this.stunned-dt);
    if(this.ramping&&this.target){this.rampTimer+=dt;if(this.rampTimer>=3&&this.rampStacks<3){this.rampStacks++;this.rampTimer=0;this.atk=(this.card.atk||60)+this.rampStacks*15;}}
    if(this.duration>0&&this.age>=this.duration){this.die();return;}
    if(this.spawnCd>0){this.spawnTimer+=dt;if(this.spawnTimer>=this.spawnCd){this.spawnTimer-=this.spawnCd;this.spawnMinion();}}
    if(this.stunned>0)return;
    this.findTarget();
    if(this.target&&this.inRange(this.target))this.attackTarget(dt);
    else if(this.speed>0)this.move(dt);
  }
  findTarget(){
    const enemies=game.units.filter(u=>u.alive&&u.team!==this.team&&(u.lane===this.lane||this.crossLane));
    if(this.prioCore){
      const tt=this.getTowerTargets();
      const cores=tt.filter(t=>t.isCore).sort((a,b)=>Math.abs(a.x-this.x)-Math.abs(b.x-this.x));
      if(cores.length>0){this.target=cores[0];return;}
      if(tt.length>0){this.target=tt[0];return;}
    }
    if(this.flyTarget&&!this.isFlying){
      const tt=this.getTowerTargets();if(tt.length>0){this.target=tt[0];return;}
    }
    if(!this.isFlying){
      const taunts=enemies.filter(u=>u.taunt&&u.alive&&Math.abs(u.x-this.x)<u.tauntRange);
      if(taunts.length>0){this.target=taunts[0];return;}
    }
    const reachable=enemies.filter(u=>{
      if(u.lane!==this.lane&&(!this.crossLane||Math.abs(u.x-this.x)>this.range*0.65))return false;
      if(u.isFlying&&!this.flyTarget)return false;
      if(u.stealth&&!u.revealed)return false;
      return true;
    });
    if(this.prioLowest)reachable.sort((a,b)=>a.hp-b.hp);
    else reachable.sort((a,b)=>{
      const laneDiffA=Math.abs(a.lane-this.lane),laneDiffB=Math.abs(b.lane-this.lane);
      if(laneDiffA!==laneDiffB)return laneDiffA-laneDiffB;
      return Math.abs(a.x-this.x)-Math.abs(b.x-this.x);
    });
    this.target=reachable.length>0?reachable[0]:null;
    if(!this.target){const tt=this.getTowerTargets();this.target=tt.length>0?tt[0]:null;}
  }
  getTowerTargets(){
    const targets=[],dir=this.team==='blue'?1:-1;
    for(let li=0;li<3;li++){
      if(li!==this.lane&&!this.flyTarget&&!this.crossLane)continue;
      const tower=game.towers.find(t=>t.team!==this.team&&t.lane===li&&t.alive);
      if(tower){const dx=tower.x-this.x;if((dir>0&&dx>0)||(dir<0&&dx<0))targets.push(tower);}
      if(!game.towers.find(t=>t.team!==this.team&&t.lane===li&&t.alive)){
        const coreHpArr=this.team==='blue'?game.aiCoreHpPerLane:game.coreHpPerLane;
        const cx=this.team==='blue'?LANE_X1+16:LANE_X0-16;
        if(coreHpArr[li]>0)targets.push({x:cx,y:LANES_Y[li],hp:coreHpArr[li],alive:true,isCore:true,lane:li,team:this.team==='blue'?'red':'blue'});
      }
    }
    return targets;
  }
  inRange(t){
    let tx=t.x,ty=t._y!==undefined?t._y:(t.y||0);
    let laneY=LANES_Y[this.lane];
    if(t.lane!==undefined)laneY=LANES_Y[t.lane];
    return Math.abs(this.x-tx)<this.range&&Math.abs(laneY-ty)<50;
  }
  move(dt){const d=this.team==='blue'?1:-1;this.x+=this.speed*d*dt;this.x=Math.max(LANE_X0,Math.min(LANE_X1,this.x));}
  attackTarget(dt){
    if(this.atkCd>0||this.atk<=0)return;this.atkCd=this.atkSpd;
    let dmg=this.atk*(this.atkSpd>0?this.atkSpd:1);
    if(this.bonusVs){
      if(this.target.card&&this.target.card.id===this.bonusVs)dmg*=2;
      if(this.bonusVs==='db_tower'&&this.target.isTower&&this.target.lane===2)dmg*=2;
    }
    if(this.target.isCore){
      const coreArr=this.team==='blue'?game.aiCoreHpPerLane:game.coreHpPerLane;
      coreArr[this.target.lane]-=dmg;
      if(coreArr[this.target.lane]<0)coreArr[this.target.lane]=0;
      spawnFloatingText(this.target.x,this.target.y,Math.round(dmg),this.team);
    }
    else if(this.target.isTower){this.target.hp-=dmg;spawnFloatingText(this.target.x,this.target._y,Math.round(dmg),this.team);if(this.target.hp<=0)this.target.alive=false;}
    else{this.target.hp-=dmg;spawnFloatingText(this.target.x,this.target.y,Math.round(dmg),this.team);if(this.target.hp<=0)this.target.die();}
    if(this.aoe&&this.target&&!this.target.isCore){
      const sDmg=this.atk*0.5*(this.atkSpd>0?this.atkSpd:1);
      game.units.forEach(u=>{
        const sameLaneOrCross=u.lane===this.lane||this.crossLane;
        if(u!==this.target&&u.alive&&u.team!==this.team&&sameLaneOrCross&&Math.abs(u.x-this.target.x)<100){u.hp-=sDmg;if(u.hp<=0)u.die();}
      });
      game.units.forEach(u=>{if(u.stealth&&u.team!==this.team&&(u.lane===this.lane||this.crossLane)&&Math.abs(u.x-this.x)<this.range)u.revealed=true;});
    }
  }
  spawnMinion(){
    const mc={id:'minion',name:'后门小兵',type:'ground',hp:200,atk:70,atkSpd:0.5,range:55,speed:110};
    game.units.push(new Unit(mc,this.team,this.lane,this.x+(this.team==='blue'?20:-20)));
  }
  die(){
    this.alive=false;spawnParticles(this.x,this.y,this.isFlying?'#e0c040':this.team==='blue'?'#3c8cf5':'#f04040',10);
    if(this.deathDmg>0){game.units.forEach(u=>{if(u.alive&&u.team!==this.team&&u.lane===this.lane&&Math.abs(u.x-this.x)<100){u.hp-=this.deathDmg;if(u.hp<=0)u.die();}});spawnParticles(this.x,this.y,'#f0a030',20);}
  }
}

let playerTeam='blue';

function createGame(){
  const isAttack=playerTeam==='red';
  return{
    power:START_POWER,maxPower:MAX_POWER,powerRegen:POWER_REGEN,
    aiPower:START_POWER,aiMaxPower:MAX_POWER,
    coreHpPerLane:[CORE_HP,CORE_HP,CORE_HP],
    aiCoreHpPerLane:[CORE_HP,CORE_HP,CORE_HP],
    towers:[
      {team:'blue',lane:0,x:BLUE_TOWER_X,_y:LANES_Y[0],hp:TOWER_HP,maxHp:TOWER_HP,alive:true,isTower:true,shield:0,atkCd:0},
      {team:'blue',lane:1,x:BLUE_TOWER_X,_y:LANES_Y[1],hp:TOWER_HP,maxHp:TOWER_HP,alive:true,isTower:true,shield:0,atkCd:0},
      {team:'blue',lane:2,x:BLUE_TOWER_X,_y:LANES_Y[2],hp:TOWER_HP,maxHp:TOWER_HP,alive:true,isTower:true,shield:0,atkCd:0},
      {team:'red',lane:0,x:RED_TOWER_X,_y:LANES_Y[0],hp:TOWER_HP,maxHp:TOWER_HP,alive:true,isTower:true,shield:0,atkCd:0},
      {team:'red',lane:1,x:RED_TOWER_X,_y:LANES_Y[1],hp:TOWER_HP,maxHp:TOWER_HP,alive:true,isTower:true,shield:0,atkCd:0},
      {team:'red',lane:2,x:RED_TOWER_X,_y:LANES_Y[2],hp:TOWER_HP,maxHp:TOWER_HP,alive:true,isTower:true,shield:0,atkCd:0},
    ],units:[],time:0,aiTimer:0,aiNext:2.5,
    aiNextCard:null,aiNextLane:0,aiNextX:DEPLOY_ZONE_RED,
    playerDeck:[... (isAttack?RED_CARDS:BLUE_CARDS)],playerHand:[],handSize:5,
    aiDeck:[... (isAttack?BLUE_CARDS:RED_CARDS)],
    gameOver:false,winner:null,defeatMsg:'',revealTimer:0,
    drawCooldown:0
  };
}
function drawHand(g,forceOne){
  if(g.drawCooldown>0&&!forceOne)return;
  if(g.playerHand.length>=g.handSize||g.playerDeck.length===0)return;
  const i=Math.floor(Math.random()*g.playerDeck.length);
  g.playerHand.push(g.playerDeck.splice(i,1)[0]);
  g.drawCooldown=DRAW_INTERVAL;
}
function startGame(team){
  playerTeam=team||'blue';
  document.getElementById('overlay').style.display='none';
  game=createGame();
  // initial fill: draw up to handSize ignoring cooldown
  while(game.playerHand.length<game.handSize&&game.playerDeck.length>0){
    const i=Math.floor(Math.random()*game.playerDeck.length);
    game.playerHand.push(game.playerDeck.splice(i,1)[0]);
  }
  game.drawCooldown=DRAW_INTERVAL;
  selectedCard=null;
  rebuildCardHand();updateTip();if(animId)cancelAnimationFrame(animId);loop(performance.now());
}

const CARD_COLORS={
  firewall:'#3c8cf5',waf:'#5ca8f0',ids:'#50e890',edr:'#4088e0',honeypot:'#e0b040',
  patch:'#60d080',emergency:'#f06040',encrypt:'#70c0f0',threat_hunter:'#20d0a0',
  scan:'#f08040',phish:'#e0c040',sql_inject:'#e04040',bruteforce:'#f06030',
  zeroday:'#c030c0',ddos:'#a03030',ransomware:'#d02020',backdoor:'#9040d0',
  minion:'#a040d0'
};
function rebuildCardHand(){
  const ctr=document.getElementById('card-hand');ctr.innerHTML='';
  if(!game||game.gameOver)return;
  game.playerHand.forEach((card,i)=>{
    const accent=CARD_COLORS[card.id]||'#3cf58b';
    const tagText=card.type==='flying'?'飞行':card.type==='spell'?'法术':card.type==='building'?'建筑':'地面';
    const tagClass=card.type;
    let statsHtml='';
    if(card.hp)statsHtml+=`<span class="card-stat">HP<span class="card-stat-val">${card.hp}</span></span>`;
    if(card.atk)statsHtml+=`<span class="card-stat">ATK<span class="card-stat-val">${card.atk}${card.atkSpd?'/s':''}</span></span>`;
    if(card.duration)statsHtml+=`<span class="card-stat">⏱<span class="card-stat-val">${card.duration}s</span></span>`;
    const d=document.createElement('div');d.className='card';d.dataset.idx=i;
    d.style.setProperty('--card-accent',accent);
    if(game.power<card.cost)d.classList.add('unaffordable');
    if(selectedCard===card)d.classList.add('selected');
    d.innerHTML=
      `<div class="card-inner">`+
        `<div class="card-pixel"><canvas id="pc-${i}" width="16" height="42"></canvas></div>`+
        `<div class="card-header"><span class="card-name">${card.name}</span><span class="card-cost">${card.cost}</span></div>`+
        `<div class="card-body">`+
          `<span class="card-desc">${card.desc}</span>`+
          (statsHtml?`<div class="card-stats">${statsHtml}</div>`:'')+
        `</div>`+
        `<div class="card-footer">`+
          `<span class="card-tag ${tagClass}">${tagText}</span>`+
        `</div>`+
      `</div>`;
    d.addEventListener('click', e => { e.stopPropagation(); onCardClick(card); });
    d.addEventListener('mouseenter', e => showTooltip(e, card));
    d.addEventListener('mouseleave', hideTooltip);
    d.draggable = true;
    d.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', i); e.dataTransfer.effectAllowed = 'copy'; onCardClick(card); });
    ctr.appendChild(d);
    drawCardPixel(`pc-${i}`, card, accent);
  });
}
function drawCardPixel(canvasId,card,accent){
  const cvs=document.getElementById(canvasId);if(!cvs)return;
  const ctx=cvs.getContext('2d');ctx.clearRect(0,0,16,42);
  ctx.fillStyle='#07120c';ctx.fillRect(0,0,16,42);
  const col=accent;
  ctx.fillStyle=col;
  if(card.type==='ground'){
    // pixel soldier: head 4x4, body 8x6, legs
    ctx.fillRect(6,4,4,4); ctx.fillRect(4,9,8,6); ctx.fillRect(4,16,3,8); ctx.fillRect(9,16,3,8);
    // gun
    ctx.fillStyle='#fff';ctx.fillRect(10,11,5,2);
  }else if(card.type==='flying'){
    // pixel drone
    ctx.fillRect(5,6,6,3); ctx.fillRect(3,9,10,4); ctx.fillRect(1,11,14,2);
    ctx.fillStyle='#fff';ctx.fillRect(7,10,2,2);
  }else if(card.type==='building'){
    // pixel tower
    ctx.fillRect(6,4,4,4); ctx.fillRect(4,8,8,16); ctx.fillRect(2,24,12,10);
    ctx.fillStyle='#fff';ctx.fillRect(7,12,2,4);
  }else{
    // spell orb
    ctx.beginPath();ctx.arc(8,14,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(6,12,4,4);
    ctx.fillStyle=col;ctx.fillRect(5,24,6,2);ctx.fillRect(7,22,2,6);
  }
  // ground line
  ctx.fillStyle='#1a2e20';ctx.fillRect(0,38,16,4);
}
function refreshCardVisuals(){
  if(!game||game.gameOver)return;
  document.querySelectorAll('#card-hand .card').forEach(d=>{
    const i=parseInt(d.dataset.idx),card=game.playerHand[i];

function onCardClick(card){

function updateTip(){

function showTooltip(e,card){
  const t=document.getElementById('tooltip');
  const typeLabel=card.type==='flying'?'飞行·无视地面阻挡':card.type==='building'?(card.duration?'限时'+card.duration+'秒建筑':'永久建筑'):card.type==='spell'?'瞬发法术':'沿路前进自动交战';
  let stats=[];
  if(card.hp)stats.push(`HP ${card.hp}`);
  if(card.atk)stats.push(`ATK ${card.atk}${card.atkSpd?'/s':''}`);
  if(card.duration)stats.push(`持续 ${card.duration}s`);
  const statsLine=stats.length?`<br><span style="color:#7eb896;font-size:10px">${stats.join(' · ')}</span>`:'';
  t.innerHTML=`<b>${card.name}</b> · <span style="color:#3cf58b">${card.cost}算力</span>${statsLine}<br><span style="color:#8ab89a">${card.desc}</span><br><span style="color:#5a8a6a;font-size:10px">${typeLabel}</span>`;
  t.style.display='block';t.style.left=Math.min(e.clientX+16,window.innerWidth-260)+'px';t.style.top=(e.clientY-100)+'px';

function tryDeployAt(canvasX, canvasY) {
  if (!game || game.gameOver || !selectedCard) return;
  const slot = game.playerHand.indexOf(selectedCard);
  if (slot < 0 || game.power < selectedCard.cost) return;
  let lane = -1;
  for (let i = 0; i < 3; i++) {
    if (canvasY >= LANES_Y[i] - LANE_H / 2 && canvasY <= LANES_Y[i] + LANE_H / 2) { lane = i; break; }
  }
  if (lane < 0) return;
  const card = game.playerHand[slot];
  const team = playerTeam;
  let dx;
  if (team === 'blue') dx = Math.max(DEPLOY_ZONE_BLUE - 160, Math.min(DEPLOY_ZONE_BLUE, canvasX));
  else dx = Math.max(DEPLOY_ZONE_RED, Math.min(DEPLOY_ZONE_RED + 160, canvasX));
  if (card.type === 'spell') castSpell(card, team, lane, dx, canvasY);
  else game.units.push(new Unit(card, team, lane, dx));
  game.power -= card.cost;
  game.playerHand.splice(slot, 1); game.playerDeck.push(card);
  selectedCard = null; drawHand(game,true); rebuildCardHand(); updateTip();
}

function castSpell(card,team,lane,x,y){
  switch(card.spell){
    case'heal':{
      let best=null,bd=Infinity;
      game.towers.filter(t=>t.team===team&&t.alive).forEach(t=>{const d=Math.hypot(t.x-x,t._y-y);if(d<bd){bd=d;best=t;}});
      game.units.filter(u=>u.team===team&&u.isBuilding&&u.alive).forEach(u=>{const d=Math.hypot(u.x-x,u.y-y);if(d<bd){bd=d;best=u;}});
      if(best&&bd<200){const h=card.healPct*(best.maxHp||best.hp*2.5);best.hp=Math.min((best.maxHp||best.hp*2.5),best.hp+h);spawnFloatingText(best.x,best._y||best.y,'+'+Math.round(h),'blue');spawnParticles(best.x,best._y||best.y,'#60d080',15);}
      break;}
    case'killAll':game.units.filter(u=>u.team!==team&&u.alive).forEach(u=>u.die());spawnParticles(CANVAS_W/2,CANVAS_H/2,'#ffffff',40);showMessage('应急响应启动 · 全图清场');break;
    case'shield':{
      let tgt=null,td=Infinity;
      game.towers.filter(t=>t.team===team&&t.alive).forEach(t=>{const d=Math.hypot(t.x-x,t._y-y);if(d<td){td=d;tgt=t;}});
      if(tgt&&td<200){tgt.shield=(tgt.shield||0)+card.shieldAmt;spawnFloatingText(tgt.x,tgt._y,'盾+'+card.shieldAmt,'blue');}break;}
    case'reveal':game.revealTimer=card.revealTime;game.units.filter(u=>u.team!==team).forEach(u=>u.revealed=true);break;
    case'directDmg':{
      let v=null,vd=Infinity;
      game.towers.filter(t=>t.team!==team&&t.alive).forEach(t=>{const d=Math.hypot(t.x-x,t._y-y);if(d<vd){vd=d;v=t;}});
      if(v&&vd<200){v.hp-=card.dmg;spawnFloatingText(v.x,v._y,card.dmg,'red');spawnParticles(v.x,v._y,'#c030c0',20);if(v.hp<=0)v.alive=false;}break;}
    case'aoeStun':
      game.units.filter(u=>u.team!==team&&u.alive&&u.lane===lane).forEach(u=>{u.hp-=card.dmg;u.stunned=Math.max(u.stunned,card.stun);if(u.hp<=0)u.die();});
      game.towers.filter(t=>t.team!==team&&t.alive&&t.lane===lane).forEach(t=>{t.hp-=card.dmg;if(t.hp<=0)t.alive=false;});
      spawnParticles(x,y,'#a03030',25);break;
  }
}

// ── AI ──
function aiTick(g, dt) {
  // deprecated; logic split into planAiNextMove + executeAiNextMove
}

function planAiNextMove(g) {
  const affordable = g.aiDeck.filter(c => g.aiPower >= c.cost);
  if (!affordable.length) { g.aiNextCard = null; return; }
  const card = affordable[Math.floor(Math.random() * affordable.length)];
  const aiTeam = playerTeam === 'red' ? 'blue' : 'red';
  const targetTeam = aiTeam === 'red' ? 'blue' : 'red';
  const ls = [0, 1, 2].map(li => {
    let s = 1;
    const t = g.towers.find(t => t.team === targetTeam && t.lane === li);
    if (t && t.alive) s += (1 - t.hp / t.maxHp) * 3;
    s += g.units.filter(u => u.team === targetTeam && u.alive && u.lane === li).length * 0.5;
    const cores = targetTeam === 'blue' ? g.coreHpPerLane : g.aiCoreHpPerLane;
    if (cores[li] < CORE_HP * 0.35) s += 2;
    return s;
  });
  const ts = ls.reduce((a, b) => a + b, 0);
  let r = Math.random() * ts, lane = 0;
  for (let i = 0; i < 3; i++) { r -= ls[i]; if (r <= 0) { lane = i; break; } }
  g.aiNextCard = card;
  g.aiNextLane = lane;
  g.aiNextX = aiTeam === 'red' ? DEPLOY_ZONE_RED + Math.random() * 80 : DEPLOY_ZONE_BLUE - 160 + Math.random() * 80;
}

function executeAiNextMove(g) {
  if (!g.aiNextCard) return;
  const card = g.aiNextCard;
  const aiTeam = playerTeam === 'red' ? 'blue' : 'red';
  if (card.type === 'spell') castSpell(card, aiTeam, g.aiNextLane, g.aiNextX, LANES_Y[g.aiNextLane]);
  else game.units.push(new Unit(card, aiTeam, g.aiNextLane, g.aiNextX));
  g.aiPower -= card.cost;
}

// ── Loop ──
function loop(now){
  if(!game||game.gameOver){animId=requestAnimationFrame(loop);return;}
  const dt=Math.min(0.1,(now-(game._last||now))/1000);game._last=now;
  game.time+=dt;
  const regen=game.time>=FAST_REGEN_TIME?POWER_REGEN_FAST:POWER_REGEN;
  game.power=Math.min(MAX_POWER,game.power+regen*dt);
  game.aiPower=Math.min(MAX_POWER,game.aiPower+regen*dt);
  if(selectedCard){
    const myPower=playerTeam==='blue'?game.power:game.aiPower;
    const enemyPower=playerTeam==='blue'?game.aiPower:game.power;
    const cost=selectedCard.cost;
    if(myPower>=cost&&myPower-cost>=enemyPower){
      showMessage('算力领先！可安全出牌');
    }
  }
  if(game.revealTimer>0){game.revealTimer-=dt;if(game.revealTimer<=0)game.units.forEach(u=>u.revealed=false);}
  if(game.drawCooldown>0)game.drawCooldown-=dt;
  drawHand(game);
  // IDS reveal: any friendly IDS reveals enemy stealth units in range
  game.units.filter(u=>u.alive&&u.card.flyTarget).forEach(ids=>{
    game.units.filter(e=>e.team!==ids.team&&e.stealth&&e.alive&&e.lane===ids.lane&&Math.abs(e.x-ids.x)<ids.range).forEach(e=>e.revealed=true);
  });
  game.units.forEach(u=>u.update(dt));game.units=game.units.filter(u=>u.alive);
  particleEffects.forEach(p=>{p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;});particleEffects=particleEffects.filter(p=>p.life>0);
  floatingTexts.forEach(t=>{t.life-=dt;t.y+=t.vy*dt;});floatingTexts=floatingTexts.filter(t=>t.life>0);
  lasers.forEach(l=>{l.life-=dt;});lasers=lasers.filter(l=>l.life>0);
  // Tower attacks
  game.towers.forEach(t=>{
    if(!t.alive)return;
    t.atkCd=Math.max(0,t.atkCd-dt);
    if(t.atkCd<=0){
      const enemies=game.units.filter(u=>u.alive&&u.team!==t.team&&u.lane===t.lane&&Math.abs(u.x-t.x)<TOWER_RANGE);
      if(enemies.length>0){
        const target=enemies.sort((a,b)=>Math.abs(a.x-t.x)-Math.abs(b.x-t.x))[0];
        target.hp-=TOWER_ATK;
        spawnFloatingText(target.x,target.y,Math.round(TOWER_ATK),t.team);
        spawnLaser(t.x,t._y,target.x,target.y,t.team==='blue'?'#60a0ff':'#ff6060');
        if(target.hp<=0)target.die();
        t.atkCd=TOWER_ATK_SPD;
      }
    }
  });
  game.towers.forEach(t=>{
    if(t.alive&&t.hp<=0){
      t.alive=false;
      spawnParticles(t.x,t._y,t.team==='blue'?'#2050d0':'#d03030',25);
      showMessage(`${LANE_NAMES[t.lane]}${t.team==='blue'?'蓝方':'红方'}节点塔被摧毁！`);
      shakeTimer=0.35;
      flashTimer=0.25;
    }
  });
  // AI preview: always know next move
  if(!game.aiNextCard)planAiNextMove(game);
  game.aiTimer-=dt;
  if(game.aiTimer<=0){executeAiNextMove(game);planAiNextMove(game);game.aiTimer=2.0+Math.random()*2.0;}
  const totalCore=game.coreHpPerLane.reduce((a,b)=>a+b,0);
  const totalAiCore=game.aiCoreHpPerLane.reduce((a,b)=>a+b,0);
  const playerLost=playerTeam==='blue'?totalCore<=0:totalAiCore<=0;
  const playerWon=playerTeam==='blue'?totalAiCore<=0:totalCore<=0;
  if(playerLost){endGame(playerTeam==='blue'?'red':'blue',playerTeam==='blue'?'核心服务器被攻破——域控权限丢失。\n"你的轮班结束了。"':'红队攻击链被切断——任务失败。\n"对方守住了光速城。"');return;}
  if(playerWon){endGame(playerTeam==='blue'?'blue':'red',playerTeam==='blue'?'对方核心服务器已下线——攻击链断裂。\n"光速城今夜平安。"':'对方核心服务器已攻破——域控权限到手。\n"光速城今夜失守。"');return;}
  // Time limit
  if(game.time>=GAME_TIME_LIMIT){
    const playerCoreTotal=playerTeam==='blue'?totalCore:totalAiCore;
    const aiCoreTotal=playerTeam==='blue'?totalAiCore:totalCore;
    if(playerCoreTotal>aiCoreTotal){endGame(playerTeam,playerTeam==='blue'?'时间到！核心血量领先，光速城守住。':'时间到！核心血量领先，任务成功。');return;}
    else if(aiCoreTotal>playerCoreTotal){endGame(playerTeam==='blue'?'red':'blue',playerTeam==='blue'?'时间到！核心血量落后，域控权限丢失。':'时间到！核心血量落后，攻击失败。');return;}
    else{endGame('draw','时间到！双方核心血量相同，平局。');return;}
  }
  // ── HUD ──
  document.getElementById('power-display').textContent=Math.floor(game.power)+'/'+MAX_POWER;
  document.getElementById('ai-power-display').textContent=Math.floor(game.aiPower)+'/'+MAX_POWER;
  document.getElementById('power-bar').style.width=(game.power/MAX_POWER*100)+'%';
  document.getElementById('ai-power-bar').style.width=(game.aiPower/MAX_POWER*100)+'%';
  const playerCores=playerTeam==='blue'?game.coreHpPerLane:game.aiCoreHpPerLane;
  const aiCores=playerTeam==='blue'?game.aiCoreHpPerLane:game.coreHpPerLane;
  document.getElementById('core-display').textContent=Math.max(0,Math.round(playerCores.reduce((a,b)=>a+b,0)));
  document.getElementById('ai-core-display').textContent=Math.max(0,Math.round(aiCores.reduce((a,b)=>a+b,0)));
  for(let i=0;i<3;i++){
    document.getElementById('core-bar-'+i).style.width=Math.max(0,(playerCores[i]/CORE_HP*100))+'%';
    document.getElementById('ai-core-bar-'+i).style.width=Math.max(0,(aiCores[i]/CORE_HP*100))+'%';
  }
  const m=Math.floor(game.time/60),s=Math.floor(game.time%60);
  const timeLeft=Math.max(0,GAME_TIME_LIMIT-game.time);
  const ml=Math.floor(timeLeft/60),sl=Math.floor(timeLeft%60);
  document.getElementById('time-display').textContent=String(ml).padStart(2,'0')+':'+String(sl).padStart(2,'0');
  if(timeLeft<=30)document.getElementById('time-display').classList.add('danger');
  else document.getElementById('time-display').classList.remove('danger');
  const playerCoreTotal=Math.round(playerCores.reduce((a,b)=>a+b,0));
  const ce=document.getElementById('core-display');if(playerCoreTotal<CORE_HP*0.75)ce.classList.add('danger');else ce.classList.remove('danger');
  updateAiThreatDisplay(game);
  render(game);refreshCardVisuals();
  animId=requestAnimationFrame(loop);
}
function endGame(winner,msg){
  game.gameOver=true;game.winner=winner;game.defeatMsg=msg;
  const ov=document.getElementById('overlay');ov.style.display='flex';
  const playerWon=winner===playerTeam;
  const titleColor=winner==='draw'?'#f0c030':(playerWon?'#3cf58b':'#f53c3c');
  const titleText=winner==='draw'?'平局':(playerWon?'任务完成':'任务失败');
  ov.innerHTML=`<h1 style="color:${titleColor}">${titleText}</h1><p style="white-space:pre-line">${msg}</p><div style="display:flex;gap:16px;"><button id="restart-defend-btn">防守方（蓝队）</button><button id="restart-attack-btn">进攻方（红队）</button></div>`;
  document.getElementById('restart-defend-btn').addEventListener('click',()=>startGame('blue'));
  document.getElementById('restart-attack-btn').addEventListener('click',()=>startGame('red'));
  updateTip();
}

// ── Render ──
function render(g){
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  ctx.fillStyle='#080d0a';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  // ── Side panels ──
  // Blue side (left)
  const blueGrad=ctx.createLinearGradient(0,0,LANE_X0-20,0);
  blueGrad.addColorStop(0,'rgba(20,60,180,0.08)');blueGrad.addColorStop(1,'rgba(20,60,180,0)');
  ctx.fillStyle=blueGrad;ctx.fillRect(0,0,LANE_X0-20,CANVAS_H);
  // Red side (right)
  const redGrad=ctx.createLinearGradient(LANE_X1+20,0,CANVAS_W,0);
  redGrad.addColorStop(0,'rgba(180,20,20,0)');redGrad.addColorStop(1,'rgba(180,20,20,0.08)');
  ctx.fillStyle=redGrad;ctx.fillRect(LANE_X1+20,0,CANVAS_W-LANE_X1-20,CANVAS_H);

  // Side labels (dynamic)
  ctx.save();
  ctx.fillStyle='rgba(60,140,220,0.7)';ctx.font='bold 12px "Share Tech Mono",monospace';ctx.textAlign='center';
  ctx.translate(14,CANVAS_H/2);ctx.rotate(-Math.PI/2);
  ctx.fillText(playerTeam==='red'?'红队 攻击方':'SOC 安全运营中心',0,0);
  ctx.restore();
  ctx.save();
  ctx.fillStyle='rgba(220,60,60,0.7)';ctx.font='bold 12px "Share Tech Mono",monospace';ctx.textAlign='center';
  ctx.translate(CANVAS_W-14,CANVAS_H/2);ctx.rotate(Math.PI/2);
  ctx.fillText(playerTeam==='red'?'SOC 安全运营中心':'红队 攻击方',0,0);
  ctx.restore();

  // ── Light grid (sparse) ──
  ctx.strokeStyle='rgba(20,45,30,0.25)';ctx.lineWidth=0.5;
  for(let x=LANE_X0;x<=LANE_X1;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CANVAS_H);ctx.stroke();}
  for(let y=0;y<CANVAS_H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CANVAS_W,y);ctx.stroke();}

  // ── Lanes ──
  for(let i=0;i<3;i++){
    const ly=LANES_Y[i]-LANE_H/2;
    // Lane body
    const grad=ctx.createLinearGradient(0,ly,0,ly+LANE_H);
    grad.addColorStop(0,'rgba(8,20,14,0.7)');grad.addColorStop(0.5,'rgba(12,28,20,0.3)');grad.addColorStop(1,'rgba(8,20,14,0.7)');
    ctx.fillStyle=grad;ctx.fillRect(LANE_X0,ly,LANE_W,LANE_H);
    // Lane border
    ctx.strokeStyle='#1a3a2a';ctx.lineWidth=1.5;ctx.strokeRect(LANE_X0,ly,LANE_W,LANE_H);
    // Lane name badge
    const badgeX=LANE_X0-6,badgeY=ly+10;
    ctx.fillStyle='rgba(8,16,10,0.9)';ctx.strokeStyle='#1a4a2a';ctx.lineWidth=1;
    const badgeW=90,badgeH=22;
    roundRect(ctx,badgeX-badgeW,badgeY,badgeW,badgeH,4);ctx.fill();ctx.stroke();
    ctx.fillStyle='#3cf58b';ctx.font='bold 11px "Share Tech Mono",monospace';ctx.textAlign='center';
    ctx.fillText(LANE_NAMES[i],badgeX-badgeW/2,badgeY+15);
    // Width indicator
    const widths=['宽路','窄路','中路'];
    ctx.fillStyle='#4a6b5a';ctx.font='9px "Share Tech Mono",monospace';
    ctx.fillText(widths[i]+' · '+(i===0?'外网网关':i===1?'内网跳板机':'数据库前置'),badgeX-badgeW/2,badgeY+LANE_H-6);

    // Midline dots (separation)
    const mx=(BLUE_TOWER_X+RED_TOWER_X)/2;
    ctx.fillStyle='rgba(26,58,42,0.6)';
    for(let dx=-180;dx<=180;dx+=15){ctx.beginPath();ctx.arc(mx+dx,LANES_Y[i],1.5,0,Math.PI*2);ctx.fill();}
    // Center divider line
    ctx.strokeStyle='rgba(40,80,60,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,8]);
    ctx.beginPath();ctx.moveTo(mx,ly+4);ctx.lineTo(mx,ly+LANE_H-4);ctx.stroke();
    ctx.setLineDash([]);

    // Deploy zone boundary markers
    const pTeam = playerTeam || 'blue';
    const myZoneX = pTeam === 'blue' ? DEPLOY_ZONE_BLUE : DEPLOY_ZONE_RED;
    const enemyZoneX = pTeam === 'blue' ? DEPLOY_ZONE_RED : DEPLOY_ZONE_BLUE;
    ctx.strokeStyle = "rgba(60,140,200,0.45)"; ctx.lineWidth = 1; ctx.setLineDash([6,10]);
    ctx.beginPath(); ctx.moveTo(myZoneX-160, ly); ctx.lineTo(myZoneX-160, ly+LANE_H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(myZoneX, ly); ctx.lineTo(myZoneX, ly+LANE_H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(60,140,200,0.55)"; ctx.font = "9px \"Share Tech Mono\",monospace"; ctx.textAlign = "center";
    ctx.fillText("我方部署区", myZoneX-80, ly+LANE_H-6);
    ctx.strokeStyle = "rgba(200,60,60,0.35)"; ctx.lineWidth = 1; ctx.setLineDash([6,10]);
    ctx.beginPath(); ctx.moveTo(enemyZoneX, ly); ctx.lineTo(enemyZoneX, ly+LANE_H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(200,60,60,0.5)";
    ctx.fillText("敌方部署区", enemyZoneX+40, ly+LANE_H-6);

    // Cores: left = blue core, right = red core, but label depends on team perspective
    drawCorePillar(ctx,LANE_X0-8,LANES_Y[i],g.coreHpPerLane[i],CORE_HP,'blue');
    drawCorePillar(ctx,LANE_X1+8,LANES_Y[i],g.aiCoreHpPerLane[i],CORE_HP,'red');
  }
  // Field half labels
  const pTeam2 = playerTeam || 'blue';
  const myHalfText = pTeam2 === 'blue' ? "← 我方半场" : "红方半场 →";
  const enemyHalfText = pTeam2 === 'blue' ? "红方半场 →" : "← 我方半场";
  ctx.fillStyle="rgba(150,200,255,0.55)";ctx.font="10px \"Share Tech Mono\",monospace";ctx.textAlign="center";
  ctx.fillText(myHalfText,LANE_X0+50,18);
  ctx.fillStyle="rgba(255,150,150,0.55)";
  ctx.fillText(enemyHalfText,LANE_X1-50,18);

  // ── Towers ──
  g.towers.forEach(t=>{
    if(!t.alive)return;
    const hpPct=t.hp/t.maxHp,alpha=t.stunned?0.4:1;
    // Tower body (trapezoid shape)
    const tw=TOWER_W,th=TOWER_H,top=th*0.35;
    ctx.fillStyle=t.team==='blue'?`rgba(30,100,200,${alpha})`:`rgba(180,40,40,${alpha})`;
    ctx.beginPath();
    ctx.moveTo(t.x-tw/2,t._y+th/2);ctx.lineTo(t.x-tw*0.35,t._y-th/2+top);
    ctx.lineTo(t.x+tw*0.35,t._y-th/2+top);ctx.lineTo(t.x+tw/2,t._y+th/2);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle=t.team==='blue'?`rgba(60,160,255,${alpha})`:`rgba(255,80,80,${alpha})`;ctx.lineWidth=2;
    ctx.stroke();
    // Antenna/spire on top
    ctx.fillStyle=t.team==='blue'?`rgba(80,180,255,${alpha})`:`rgba(255,100,100,${alpha})`;
    ctx.fillRect(t.x-2,t._y-th/2+top-8,4,10);
    ctx.beginPath();ctx.arc(t.x,t._y-th/2+top-8,4,0,Math.PI*2);ctx.fill();
    // HP bar
    const bw=tw+14;ctx.fillStyle='#0a0a0a';ctx.fillRect(t.x-bw/2,t._y-th/2-15,bw,5);
    ctx.fillStyle=hpPct>0.5?'#3cf58b':hpPct>0.25?'#f0c030':'#f04040';ctx.fillRect(t.x-bw/2,t._y-th/2-15,bw*hpPct,5);
    // Name badge
    const labels=['[外网网关]','[内网跳板机]','[DB前置]'];
    ctx.fillStyle=t.team==='blue'?'rgba(80,160,240,0.9)':'rgba(240,100,100,0.9)';
    ctx.font='bold 9px "Share Tech Mono",monospace';ctx.textAlign='center';
    ctx.fillText(labels[t.lane],t.x,t._y-th/2-22);
    // Shield ring
    if(t.shield>0){
      ctx.strokeStyle=`rgba(100,200,255,${0.35+0.25*Math.sin(g.time*5)})`;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(t.x,t._y,tw*0.7,0,Math.PI*2);ctx.stroke();
    }
  });

  // ── Units (sorted: ground→flying) ──
  const sorted=[...g.units].sort((a,b)=>(a.isFlying?1:0)-(b.isFlying?1:0));
  sorted.forEach(u=>{
    if(!u.alive)return;if(u.stealth&&!u.revealed&&u.team!==playerTeam)return;
    const alpha=u.stunned?0.35:(u.stealth&&u.revealed?0.55:1);
    const sz=u.isBuilding?14:u.isFlying?11:13,yOff=u.isFlying?-28:0,dy=u.y+yOff;
    ctx.globalAlpha=alpha;
    const col=u.card.color||(u.team==='blue'?'#4088e0':'#e04040');

    if(u.isBuilding){
      // Diamond building
      ctx.fillStyle=col;
      ctx.beginPath();ctx.moveTo(u.x,dy-sz);ctx.lineTo(u.x+sz,dy);ctx.lineTo(u.x,dy+sz);ctx.lineTo(u.x-sz,dy);ctx.closePath();ctx.fill();
      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
      // Inner dot
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(u.x,dy,3,0,Math.PI*2);ctx.fill();
      if(u.duration>0){const pct=u.age/u.duration;ctx.strokeStyle=`rgba(255,255,255,${0.45-pct*0.35})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(u.x,dy,sz+6,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-pct));ctx.stroke();}
      if(u.stealth){ctx.strokeStyle='rgba(160,80,240,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(u.x,dy,sz+5,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
    }else if(u.isFlying){
      // Envelope with wings
      ctx.fillStyle=col;
      ctx.beginPath();ctx.moveTo(u.x-sz,dy);ctx.lineTo(u.x,dy-sz*0.9);ctx.lineTo(u.x+sz,dy);ctx.lineTo(u.x+sz*0.6,dy+sz*0.7);ctx.lineTo(u.x-sz*0.6,dy+sz*0.7);ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=0.8;ctx.stroke();
      // Shadow
      ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(u.x,u.y+(u.isFlying?2:0),sz*0.7,2.5,0,0,Math.PI*2);ctx.fill();
    }else{
      // Hex unit
      ctx.fillStyle=col;ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3,px=u.x+Math.cos(a)*sz,py=dy+Math.sin(a)*sz;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}
      ctx.closePath();ctx.fill();ctx.stroke();
      // Direction eye
      const dir=u.team==='blue'?1:-1;
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(u.x+dir*sz*0.45,dy-sz*0.15,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(u.x+dir*sz*0.6,dy-sz*0.15,1.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // Name label above enemy / player units
    if(u.card.name){
      const isEnemy=u.team!==playerTeam;
      ctx.fillStyle='rgba(0,0,0,0.55)';
      const labelW=Math.min(80,u.card.name.length*9+4);
      ctx.fillRect(u.x-labelW/2,dy-sz-22,labelW,14);
      ctx.strokeStyle=isEnemy?'#ff6060':'#60c0ff';ctx.lineWidth=0.8;ctx.strokeRect(u.x-labelW/2,dy-sz-22,labelW,14);
      ctx.fillStyle=isEnemy?'#ffb8b8':'#b8e0ff';ctx.font='9px "Share Tech Mono",monospace';ctx.textAlign='center';
      ctx.fillText(u.card.name,u.x,dy-sz-12);
    }

    // HP bar below
    if(u.hp<u.maxHp){
      const bw=sz*2+6,by=dy+sz+8;
      ctx.fillStyle='#0a0a0a';ctx.fillRect(u.x-bw/2,by,bw,3);
      const hpPct=u.hp/u.maxHp;
      ctx.fillStyle=hpPct>0.5?'#3cf58b':hpPct>0.25?'#f0c030':'#f04040';ctx.fillRect(u.x-bw/2,by,bw*hpPct,3);
    }
    // Stun effect
    if(u.stunned>0){
      ctx.strokeStyle='rgba(255,200,50,0.7)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(u.x,dy,sz+6,0,Math.PI*2);ctx.stroke();
    }
  });

  // ── Particles & texts ──
  particleEffects.forEach(p=>{const a=p.life/p.maxLife,c=p.color;ctx.fillStyle=`rgba(${parseInt(c.slice(1,3),16)},${parseInt(c.slice(3,5),16)},${parseInt(c.slice(5,7),16)},${a})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();});
  floatingTexts.forEach(t=>{const a=t.life/t.maxLife,c=t.color;ctx.fillStyle=`rgba(${parseInt(c.slice(1,3),16)},${parseInt(c.slice(3,5),16)},${parseInt(c.slice(5,7),16)},${a})`;ctx.font='bold 13px "Share Tech Mono",monospace';ctx.textAlign='center';ctx.fillText(t.text,t.x,t.y);});
  lasers.forEach(l=>{const a=l.life/l.maxLife;ctx.strokeStyle=l.color;ctx.globalAlpha=a;ctx.lineWidth=2+a*2;ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();ctx.globalAlpha=1;});

  // ── Deploy zone highlight (when card selected) ──
  if (selectedCard && !g.gameOver) {
    const myZoneX2 = (playerTeam || 'blue') === 'blue' ? DEPLOY_ZONE_BLUE : DEPLOY_ZONE_RED;
    for (let i = 0; i < 3; i++) {
      const ly = LANES_Y[i] - LANE_H / 2;
      const zoneLeft = Math.min(myZoneX2 - 160, myZoneX2);
      const zoneRight = Math.max(myZoneX2 - 160, myZoneX2);
      if (mouseY >= ly && mouseY <= ly + LANE_H) {
        ctx.strokeStyle = 'rgba(60,245,139,0.5)'; ctx.lineWidth = 2; ctx.setLineDash([]);
        ctx.strokeRect(zoneLeft + 2, ly + 2, zoneRight - zoneLeft - 4, LANE_H - 4);
        ctx.fillStyle = 'rgba(60,245,139,0.08)'; ctx.fillRect(zoneLeft + 2, ly + 2, zoneRight - zoneLeft - 4, LANE_H - 4);
      } else {
        ctx.strokeStyle = 'rgba(60,245,139,0.12)'; ctx.lineWidth = 1; ctx.setLineDash([4, 6]);
        ctx.strokeRect(zoneLeft + 2, ly + 2, zoneRight - zoneLeft - 4, LANE_H - 4);
        ctx.setLineDash([]);
      }
    }
    // Deployment preview ghost
    drawDeployGhost(ctx, g);
  }
}

function drawDeployGhost(ctx, g) {
  if (!selectedCard) return;
  const team = playerTeam;
  const lane = Math.round((mouseY - LANES_Y[0]) / (LANES_Y[1] - LANES_Y[0]));
  if (lane < 0 || lane > 2) return;
  const ly = LANES_Y[lane] - LANE_H / 2;
  if (mouseY < ly || mouseY > ly + LANE_H) return;
  const myZoneX = team === 'blue' ? DEPLOY_ZONE_BLUE : DEPLOY_ZONE_RED;
  const zoneLeft = Math.min(myZoneX - 160, myZoneX);
  const zoneRight = Math.max(myZoneX - 160, myZoneX);
  let gx = Math.max(zoneLeft, Math.min(zoneRight, mouseX));
  const gy = LANES_Y[lane];
  const card = selectedCard;
  const col = card.color || (team === 'blue' ? '#3c8cf5' : '#e04040');
  ctx.globalAlpha = 0.45;
  ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
  if (card.type === 'ground') {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) { const a = Math.PI / 6 + i * Math.PI / 3, px = gx + Math.cos(a) * 13, py = gy + Math.sin(a) * 13; if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
    ctx.closePath(); ctx.stroke();
  } else if (card.type === 'flying') {
    ctx.beginPath(); ctx.moveTo(gx - 11, gy); ctx.lineTo(gx, gy - 10); ctx.lineTo(gx + 11, gy); ctx.lineTo(gx + 7, gy + 8); ctx.lineTo(gx - 7, gy + 8); ctx.closePath(); ctx.stroke();
  } else if (card.type === 'building') {
    ctx.beginPath(); ctx.moveTo(gx, gy - 14); ctx.lineTo(gx + 14, gy); ctx.lineTo(gx, gy + 14); ctx.lineTo(gx - 14, gy); ctx.closePath(); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(gx, gy, 10, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
}

function drawCorePillar(ctx,x,y,hp,maxHp,team){
  const w=CORE_W,h=PER_LANE_CORE_H;
  const cx=x-w/2,cy=y-h/2;
  const hpPct=hp/maxHp;
  // Pillar body
  const bodyGrad=ctx.createLinearGradient(cx,0,cx+w,0);
  if(team==='blue'){bodyGrad.addColorStop(0,'rgba(20,60,150,0.7)');bodyGrad.addColorStop(0.5,'rgba(40,100,220,0.85)');bodyGrad.addColorStop(1,'rgba(20,60,150,0.7)');}
  else{bodyGrad.addColorStop(0,'rgba(150,20,20,0.7)');bodyGrad.addColorStop(0.5,'rgba(200,40,40,0.85)');bodyGrad.addColorStop(1,'rgba(150,20,20,0.7)');}
  ctx.fillStyle=bodyGrad;roundRect(ctx,cx,cy,w,h,3);ctx.fill();
  ctx.strokeStyle=team==='blue'?'rgba(60,150,255,0.7)':'rgba(255,80,80,0.7)';ctx.lineWidth=1.5;
  roundRect(ctx,cx,cy,w,h,3);ctx.stroke();
  // HP bar inside
  const barPad=3,barW=w-barPad*2;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(cx+barPad,cy+barPad,barW,h-barPad*2);
  const barH=(h-barPad*2)*hpPct;
  const barY=cy+barPad+(h-barPad*2)-barH;
  ctx.fillStyle=team==='blue'?'rgba(60,220,120,0.8)':'rgba(240,80,60,0.8)';
  ctx.fillRect(cx+barPad,barY,barW,barH);
  // HP text
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 9px "Share Tech Mono",monospace';ctx.textAlign='center';
  ctx.fillText(Math.round(hp)+'',x,cy+h/2+3);
  // Label above (team names, not relative to player perspective)
  ctx.fillStyle=team==='blue'?'rgba(150,200,255,0.8)':'rgba(255,150,150,0.8)';
  ctx.fillText(team==='blue'?'蓝核':'红核',x,cy-6);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// Init
document.getElementById('start-defend-btn').addEventListener('click',()=>startGame('blue'));
document.getElementById('start-attack-btn').addEventListener('click',()=>startGame('red'));
(function initBg(){
  const ctx=canvas.getContext('2d');ctx.fillStyle='#080d0a';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  ctx.strokeStyle='rgba(20,45,30,0.25)';ctx.lineWidth=0.5;
  for(let x=LANE_X0;x<=LANE_X1;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CANVAS_H);ctx.stroke();}
  for(let y=0;y<CANVAS_H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CANVAS_W,y);ctx.stroke();}
  for(let i=0;i<3;i++){const ly=LANES_Y[i]-LANE_H/2;ctx.strokeStyle='#1a3a2a';ctx.lineWidth=1.5;ctx.strokeRect(LANE_X0,ly,LANE_W,LANE_H);ctx.fillStyle='#3cf58b';ctx.font='bold 11px "Share Tech Mono",monospace';ctx.textAlign='right';ctx.fillText(LANE_NAMES[i],LANE_X0-12,LANES_Y[i]+4);}
})();
